name: Sync with Upstream

on:
  schedule:
    - cron: '0 0 * * *'  # 每天凌晨 0 点（UTC 时间）自动同步
  workflow_dispatch:     # 允许手动触发同步

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # 拉取完整的 Git 历史
          persist-credentials: false

      - name: Sync with upstream repository
        run: |
          git config --global user.name "GitHub Actions Bot"
          git config --global user.email "actions@github.com"
          git remote add upstream https://github.com/fuzhengwei/CodeGuide.git
          git fetch upstream
          git checkout master
          git merge upstream/master --no-edit --allow-unrelated-histories
          git remote set-url origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/gaogushenling/CodeGuide.git
          git push origin master
