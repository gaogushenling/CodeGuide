name: Sync with Upstream

on:
  schedule:
    - cron: '0 0 * * *'  # 每天凌晨 0 点（UTC 时间）自动同步
  workflow_dispatch:     # 允许手动触发同步

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # 拉取完整的 Git 历史

      - name: Sync fork with upstream
        uses: aormsby/Fork-Sync-With-Upstream-action@v3.4.1
        with:
          # 替换为 v3.4.1 支持的新参数名
          upstream_sync_repo: fuzhengwei/CodeGuide
          upstream_sync_branch: master
          target_sync_branch: master
          # 新增必填的权限参数（使用 GitHub 内置 Token）
          upstream_repo_access_token: ${{ secrets.GITHUB_TOKEN }}
          # 修正用户信息参数名
          git_config_user: 'GitHub Actions Bot'
          git_config_email: 'actions@github.com'
